    const FONTS = [
      { name: 'Arial', value: 'Arial, sans-serif', url: '' },
      { name: 'Impact', value: 'Impact, sans-serif', url: '' },
      { name: 'Courier New', value: '"Courier New", monospace', url: '' },
      { name: 'Orbitron (Digital)', value: '"Orbitron", sans-serif', url: 'https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap' },
      { name: 'Roboto', value: '"Roboto", sans-serif', url: 'https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap' },

    const checkerboardStyle = {

      backgroundSize: '20px 20px',

    };

    const Slider = ({ label, value, min, max, step = 1, onChange, disabled = false }) => (
      <div className={`flex flex-col gap-1.5 mb-5 transition-opacity ${disabled ? 'opacity-40 pointer-events-none' : ''}`}>
        <div className="flex justify-between items-center">
          <label className="text-sm font-medium" style={{ color: '#9ca3af' }}>{label}</label>
          <span className="text-xs font-mono px-2 py-0.5 rounded-md" style={{ backgroundColor: '#111', color: '#f3f4f6', border: '1px solid #333' }}>{value}</span>
        </div>
        <input 
          type="range" min={min} max={max} step={step} value={value} 
          onChange={(e) => onChange(Number(e.target.value))}
          disabled={disabled}
          className="w-full h-1.5 rounded-lg appearance-none cursor-pointer mt-1"
          style={{ background: '#151515', accentColor: '#5D9CC4', outline: 'none' }}
        />
      </div>
    );

    const ColorPicker = ({ label, value, onChange, className = "mb-5" }) => (
      <div className={`flex items-center justify-between ${className}`}>
        <label className="text-sm font-medium" style={{ color: '#9ca3af' }}>{label}</label>
        <div className="flex items-center gap-3">
          <span className="text-xs font-mono uppercase px-2 py-1 rounded-md" style={{ backgroundColor: '#111', color: '#f3f4f6', border: '1px solid #333' }}>{value}</span>
          <div className="relative w-8 h-8 rounded-md overflow-hidden cursor-pointer hover:scale-105 transition-transform" style={{ border: '1px solid #2e2e2e', boxShadow: '0 2px 4px rgba(0,0,0,0.2)' }}>
            <input

              className="absolute -top-2 -left-2 w-12 h-12 cursor-pointer"
            />
          </div>
        </div>
      </div>
    );

    const PanelHeading = ({ icon: Icon, title }) => (
      <h4 className="flex items-center gap-2 text-white font-bold mb-6 pb-3 border-b border-[#333] text-[15px] tracking-wide">

    const QuickSettingItem = ({ icon: Icon, label, description, isActive, onToggle, children }) => (
      <div className={`rounded-xl border transition-all duration-300 overflow-hidden mb-4 ${isActive ? 'bg-[#222] border-[#444] shadow-[0_4px_12px_rgba(0,0,0,0.2)]' : 'bg-[#1a1a1a] border-[#333] hover:border-[#444]'}`}>
        <div 
          className="p-4 flex items-center justify-between cursor-pointer"
          onClick={() => onToggle(!isActive)}
        >
          <div className="flex items-center gap-3.5">
            <div className={`w-9 h-9 rounded-lg flex items-center justify-center transition-colors ${isActive ? 'bg-[#5D9CC4]/10 text-[#5D9CC4]' : 'bg-[#252525] text-[#777]'}`}>
              <Icon className="w-5 h-5" />
            </div>
            <div>
              <h4 className="text-sm font-semibold text-white tracking-wide">{label}</h4>
              <p className="text-[11px] text-[#888] mt-0.5">{description}</p>
            </div>
          </div>
          <div className="switch" onClick={(e) => { e.stopPropagation(); onToggle(!isActive); }}>
            <input type="checkbox" checked={isActive} readOnly />
            <span className="slider"></span>
          </div>
        </div>
        <div className={`transition-all duration-300 ease-in-out ${isActive ? 'max-h-[500px] opacity-100' : 'max-h-0 opacity-0'}`}>
          <div className="px-4 pb-4 pt-1 border-t border-[#333] mx-4 mt-1">
            {children}
          </div>
        </div>
      </div>
    );

    function App() {
      const [activeTab, setActiveTab] = useState('text');

      const [fontIndex, setFontIndex] = useState(3);
      const [fontSize, setFontSize] = useState(80);
      const [color, setColor] = useState('#ffffff');
      const [bold, setBold] = useState(true);
      const [textAlign, setTextAlign] = useState('center');
      
      const [strokeWidth, setStrokeWidth] = useState(2);
      const [strokeColor, setStrokeColor] = useState('#000000');
      
      const [showShadow, setShowShadow] = useState(true);
      const [shadowColor, setShadowColor] = useState('#000000');
      const [shadowBlur, setShadowBlur] = useState(8);
      const [shadowX, setShadowX] = useState(3);
      const [shadowY, setShadowY] = useState(3);
      
      const [bgColor, setBgColor] = useState('#00ff00');
      const [bgOpacity, setBgOpacity] = useState(0);
      const [timeFormat, setTimeFormat] = useState('HH:mm:ss');
      
      const [previewMode, setPreviewMode] = useState('normal');
      const [previewWidth, setPreviewWidth] = useState(800);
      const previewRef = useRef(null);

      const [digitWidth, setDigitWidth] = useState(1.0);

      const [customFontFile, setCustomFontFile] = useState(null);
      const [customFontUrl, setCustomFontUrl] = useState('');
      const [useCustomFont, setUseCustomFont] = useState(false);
      const fileInputRef = useRef(null);

      const [decLabel, setDecLabel] = useState(true);
      const [decLabelText, setDecLabelText] = useState('#Timer');
      const [labelSize, setLabelSize] = useState(0.2);
      const [labelAlignY, setLabelAlignY] = useState('top');
      const [labelOffsetX, setLabelOffsetX] = useState(0);
      const [labelOffsetY, setLabelOffsetY] = useState(0);
      const [decFrame, setDecFrame] = useState('none');
      const [framePadding, setFramePadding] = useState(0.4);
      const [frameBgColor, setFrameBgColor] = useState('#000000'); 
      const [rowGap, setRowGap] = useState(0.1);

      // Timer Mock State
      const [currentTimeStr, setCurrentTimeStr] = useState('00:00:00');
      const [mockMode, setMockMode] = useState('up');
      const [mockTargetMs, setMockTargetMs] = useState(300000);
      const [mockStatus, setMockStatus] = useState('stopped');
      const stateRef = useRef({ status: 'stopped', start: 0, accum: 0, mode: 'up', target: 300000 });

      const RESOLUTIONS = {
        fhd: { width: 1920, height: 1080 },
        qhd: { width: 2560, height: 1440 },
        '4k': { width: 3840, height: 2160 },
      };

      const selectedFont = FONTS[fontIndex];

      const TABS = [
        { id: 'text', label: '基本 / テキスト', icon: Type },
        { id: 'design', label: 'カラー / 装飾', icon: Palette },
        { id: 'custom', label: 'カスタム要素', icon: Sparkles },
        { id: 'help', label: '使い方 / Q&A', icon: HelpCircle },
      ];

      useEffect(() => {
        if (!previewRef.current) return;
        const observer = new ResizeObserver((entries) => {
          for (let entry of entries) {
            setPreviewWidth(entry.contentRect.width);
          }
        });
        observer.observe(previewRef.current);
        return () => observer.disconnect();
      }, []);

      const hexToRgb = (hex) => {
        let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '0, 0, 0';
      };

      const getDecorationCSS = () => {
        const frameRgb = hexToRgb(frameBgColor);
        const css = `
          .clock-wrapper {
            position: relative;
            display: inline-flex;
            flex-direction: column;
            box-sizing: border-box;
          }
          .frame-simple {
            background: rgba(${frameRgb}, 0.6);
            border: 0.05em solid #ffffff;
            border-radius: 0.2em;
          }
          .frame-glass {
            background: rgba(${frameRgb}, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 0.02em solid rgba(255, 255, 255, 0.3);
            border-radius: 0.3em;
            box-shadow: 0 0.1em 0.4em rgba(0, 0, 0, 0.4);
          }
          .frame-cyber {
            background: rgba(${frameRgb}, 0.85);
            border-left: 0.05em solid #00ffcc;
            border-right: 0.05em solid #ff00ff;
            clip-path: polygon(0.2em 0, 100% 0, 100% calc(100% - 0.2em), calc(100% - 0.2em) 100%, 0 100%, 0 0.2em);
          }

          .label-row.top { display: flex; justify-content: flex-start; width: 100%; margin-bottom: ${rowGap}em; }
          .label-row.bottom { display: flex; justify-content: flex-start; width: 100%; margin-top: ${rowGap}em; }

          .time-label {
            font-family: Arial, sans-serif;
            font-size: ${labelSize}em;
            font-weight: bold;
            letter-spacing: 0.1em;
            color: ${color};
            transform: translate(${labelOffsetX}em, ${labelOffsetY}em);
            ${strokeWidth > 0 ? `-webkit-text-stroke: ${strokeWidth * labelSize}px ${strokeColor};` : ''}
            ${showShadow ? `text-shadow: ${shadowX * labelSize}px ${shadowY * labelSize}px ${shadowBlur * labelSize}px ${shadowColor};` : ''}
          }
        `;
        return css.replace(/<br\s*\/?>/gi, '\n');
      };

      useEffect(() => {
        if (customFontUrl && useCustomFont) {
          const style = document.createElement('style');
          style.id = 'custom-font-style';
          style.innerHTML = `
            @font-face {
              font-family: 'OBSCustomFont';
              src: url('${customFontUrl}');
            }
          `.replace(/<br\s*\/?>/gi, '\n');
          document.head.appendChild(style);
          return () => document.head.removeChild(style);
        }
      }, [customFontUrl, useCustomFont]);

      useEffect(() => {
        const linkId = 'dynamic-preview-font';
        let linkElement = document.getElementById(linkId);
        
        if (selectedFont.url) {
          if (!linkElement) {
            linkElement = document.createElement('link');
            linkElement.id = linkId;
            linkElement.rel = 'stylesheet';
            document.head.appendChild(linkElement);
          }
          linkElement.href = selectedFont.url;
        }
      }, [selectedFont]);

      // Timer Animation Loop
      useEffect(() => {
        let animationFrameId;
        const loop = () => {
          let elapsed = stateRef.current.accum;
          if (stateRef.current.status === 'running') {
            elapsed += Date.now() - stateRef.current.start;
          }
          
          let currentMs = 0;
          if (stateRef.current.mode === 'up') {
            currentMs = elapsed;
          } else {
            currentMs = Math.max(0, stateRef.current.target - elapsed);
          }
          
          const totalSeconds = Math.floor(currentMs / 1000);
          const h = Math.floor(totalSeconds / 3600);
          const m = Math.floor((totalSeconds % 3600) / 60);
          const s = totalSeconds % 60;
          const total_m = Math.floor(totalSeconds / 60);

          let displayStr = '';
          if (timeFormat === 'HH:mm:ss') {
            displayStr = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
          } else if (timeFormat === 'mm:ss') {
            displayStr = String(total_m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
          }
          
          setCurrentTimeStr(displayStr);
          animationFrameId = requestAnimationFrame(loop);
        };
        loop();
        return () => cancelAnimationFrame(animationFrameId);
      }, [timeFormat]);

      const mockStart = () => {
        if (stateRef.current.status === 'stopped') {
          stateRef.current.status = 'running';
          stateRef.current.start = Date.now();
          setMockStatus('running');
        }
      };
      
      const mockStop = () => {
        if (stateRef.current.status === 'running') {
          stateRef.current.status = 'stopped';
          stateRef.current.accum += Date.now() - stateRef.current.start;
          setMockStatus('stopped');
        }
      };
      
      const mockReset = () => {
        stateRef.current.status = 'stopped';
        stateRef.current.accum = 0;
        setMockStatus('stopped');
      };

      const generateDisplayHTML = () => {
        const fontLink = (!useCustomFont && selectedFont.url) ? `\n<link href="${selectedFont.url}" rel="stylesheet">` : '';
        let fontFaceCSS = '';
        if (useCustomFont && customFontFile) {
          fontFaceCSS = `
      @font-face {
        font-family: 'OBSCustomFont';
        src: url('./${customFontFile.name}');
      }`;
        }
        const currentFontFamily = useCustomFont ? "'OBSCustomFont', sans-serif" : selectedFont.value;

        return `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>OBS Timer Display</title>${fontLink}
<style>
  ${fontFaceCSS}
  ${getDecorationCSS()}
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
    background-color: rgba(${hexToRgb(bgColor)}, ${bgOpacity});
  }
  body {
    display: flex; justify-content: flex-start; align-items: flex-start;
    padding: 32px; box-sizing: border-box;
  }
  #clock {
    display: flex; align-items: center; justify-content: center; line-height: 1;
    font-family: ${currentFontFamily}; font-size: 1em; color: ${color};
    font-weight: ${bold ? 'bold' : 'normal'}; white-space: nowrap;
    ${strokeWidth > 0 ? `-webkit-text-stroke: ${strokeWidth}px ${strokeColor};` : ''}
    ${showShadow ? `text-shadow: ${shadowX}px ${shadowY}px ${shadowBlur}px ${shadowColor};` : ''}
  }
  .digit { display: inline-block; width: ${digitWidth}em; text-align: ${textAlign}; }
  .non-digit { display: inline-block; text-align: ${textAlign}; }
</style>
</head>
<body>
  <div class="clock-wrapper ${decFrame !== 'none' ? `frame-${decFrame}` : ''}" style="font-size: ${fontSize}px; padding: ${decFrame !== 'none' ? framePadding : 0}em;">
    ${decLabel && labelAlignY === 'top' ? `
    <div class="label-row top"><div class="time-label">${decLabelText}</div></div>` : ''}
    <div id="clock">00:00:00</div>
    ${decLabel && labelAlignY === 'bottom' ? `
    <div class="label-row bottom"><div class="time-label">${decLabelText}</div></div>` : ''}
  </div>
  <script>
    async function updateTime() {
      try {
        const res = await fetch('/status');
        const data = await res.json();
        
        const format = "${timeFormat}";
        let display = "";
        if (format === 'HH:mm:ss') {
          display = data.h + ':' + data.m + ':' + data.s;
        } else if (format === 'mm:ss') {
          display = data.total_m + ':' + data.s;
        }
        
        let html = "";
        for (let i = 0; i < display.length; i++) {
          const char = display[i];
          if (/[0-9]/.test(char)) {
            html += '<span class="digit">' + char + '</span>';
          } else {
            html += '<span class="non-digit">' + char + '</span>';
          }
        }
        const clockEl = document.getElementById('clock');
        if (clockEl) clockEl.innerHTML = html;
      } catch(e) {}
    }
    setInterval(updateTime, 200);
    updateTime();
  <\/script>
</body>
</html>`;
      };

      const generateControlHTML = () => {
        return `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer Control Panel</title>
<script src="https://cdn.tailwindcss.com"><\/script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">
  <div class="w-full max-w-md bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
    <h1 class="text-2xl font-bold mb-2 text-blue-400 text-center tracking-wider">TIMER CONTROL</h1>
    <p class="text-gray-400 text-center text-sm mb-6">NEURA Timer</p>
    
    <div class="bg-gray-900 rounded-xl py-6 border border-gray-700 mb-6 shadow-inner">
      <div class="text-6xl font-mono text-center font-bold text-white tracking-widest" id="time-display">00:00:00</div>
      <div class="text-center mt-2 text-sm font-bold tracking-widest text-green-400 uppercase" id="status-display">LOADING...</div>
    </div>

    <div class="grid grid-cols-3 gap-3 mb-8">
      <button onclick="api('/start')" class="bg-green-600 hover:bg-green-500 py-4 rounded-xl font-bold text-lg transition-transform active:scale-95 shadow-lg shadow-green-900/50">Start</button>
      <button onclick="api('/stop')" class="bg-red-600 hover:bg-red-500 py-4 rounded-xl font-bold text-lg transition-transform active:scale-95 shadow-lg shadow-red-900/50">Stop</button>
      <button onclick="api('/reset')" class="bg-gray-600 hover:bg-gray-500 py-4 rounded-xl font-bold text-lg transition-transform active:scale-95 shadow-lg shadow-gray-900/50">Reset</button>
    </div>

    <div class="border-t border-gray-700 pt-6">
      <h2 class="text-sm font-bold mb-4 text-gray-400 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        設定 (モード切替)
      </h2>
      <div class="flex flex-col gap-4">
        <div class="flex gap-3">
          <select id="mode-select" class="bg-gray-900 border border-gray-600 text-white p-3 rounded-lg flex-1 outline-none focus:border-blue-500 transition-colors">
            <option value="up">カウントアップ</option>
            <option value="down">カウントダウン</option>
          </select>
          <div class="flex items-center gap-2 bg-gray-900 border border-gray-600 rounded-lg px-3 focus-within:border-blue-500 transition-colors">
            <input type="number" id="seconds-input" value="300" class="bg-transparent text-white w-16 outline-none text-center text-lg">
            <span class="text-gray-400 text-sm">秒</span>
          </div>
        </div>
        <button onclick="applySettings()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold transition-transform active:scale-95 shadow-lg shadow-blue-900/50">適用してリセット</button>
      </div>
    </div>
  </div>

  <script>
    async function api(path, body = null) {
      try {
        await fetch(path, {
          method: 'POST',
          headers: body ? { 'Content-Type': 'application/json' } : {},
          body: body ? JSON.stringify(body) : null
        });
        updateStatus();
      } catch (e) { console.error(e); }
    }

    async function applySettings() {
      const mode = document.getElementById('mode-select').value;
      const seconds = parseInt(document.getElementById('seconds-input').value, 10);
      await api('/set', { mode, seconds });
    }

    async function updateStatus() {
      try {
        const res = await fetch('/status');
        const data = await res.json();
        
        const format = "${timeFormat}";
        if (format === 'HH:mm:ss') {
          document.getElementById('time-display').innerText = data.h + ':' + data.m + ':' + data.s;
        } else {
          document.getElementById('time-display').innerText = data.total_m + ':' + data.s;
        }
        
        const statusEl = document.getElementById('status-display');

const fs = require('fs');
const path = require('path');

let timerState = {
  status: 'stopped',
  mode: 'up',
  startTime: 0,
  accumulated: 0,
  targetMs: 300000
};

function getDisplayTime() {
  let elapsed = timerState.accumulated;
  if (timerState.status === 'running') {
    elapsed += Date.now() - timerState.startTime;
  }
  
  let currentMs = 0;
  if (timerState.mode === 'up') {
    currentMs = elapsed;
  } else {
    currentMs = Math.max(0, timerState.targetMs - elapsed);
  }
  
  const totalSeconds = Math.floor(currentMs / 1000);
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = totalSeconds % 60;
  const total_m = Math.floor(totalSeconds / 60);
  
  return {
    h: String(h).padStart(2, '0'),
    m: String(m).padStart(2, '0'),
    s: String(s).padStart(2, '0'),
    total_m: String(total_m).padStart(2, '0'),
    raw: currentMs,
    status: timerState.status,
    mode: timerState.mode
  };
}

const server = http.createServer((req, res) => {
  res.setHeader('Access-Control-Allow-Origin', '*');
  res.setHeader('Access-Control-Allow-Methods', 'GET, POST, OPTIONS');
  res.setHeader('Access-Control-Allow-Headers', 'Content-Type');

  if (req.method === 'OPTIONS') {
    res.writeHead(204);
    res.end();
    return;
  }

  const url = new URL(req.url, 'http://' + req.headers.host);
  const pathname = url.pathname;

  if (req.method === 'GET') {
    if (pathname === '/status') {
      res.writeHead(200, { 'Content-Type': 'application/json' });
      res.end(JSON.stringify(getDisplayTime()));
      return;
    }
    
    let filePath = '.' + pathname;
    if (filePath === './') filePath = './control.html';
    if (pathname === '/display') filePath = './display.html';
    
    const extname = path.extname(filePath);
    let contentType = 'text/html';
    switch (extname) {
      case '.js': contentType = 'text/javascript'; break;
      case '.css': contentType = 'text/css'; break;
      case '.json': contentType = 'application/json'; break;
      case '.ttf': contentType = 'font/ttf'; break;
      case '.otf': contentType = 'font/otf'; break;
      case '.woff': contentType = 'font/woff'; break;
      case '.woff2': contentType = 'font/woff2'; break;
    }

    fs.readFile(filePath, (err, content) => {
      if (err) {
        if (err.code == 'ENOENT') {
          res.writeHead(404);
          res.end('File not found');
        } else {
          res.writeHead(500);
          res.end('Server error: ' + err.code);
        }
      } else {
        res.writeHead(200, { 'Content-Type': contentType });
        res.end(content, 'utf-8');
      }
    });
  } else if (req.method === 'POST') {
    if (pathname === '/start') {
      if (timerState.status === 'stopped') {
        timerState.status = 'running';
        timerState.startTime = Date.now();
      }
      res.writeHead(200); res.end('ok');
    } else if (pathname === '/stop') {
      if (timerState.status === 'running') {
        timerState.status = 'stopped';
        timerState.accumulated += Date.now() - timerState.startTime;
      }
      res.writeHead(200); res.end('ok');
    } else if (pathname === '/reset') {
      timerState.status = 'stopped';
      timerState.accumulated = 0;
      res.writeHead(200); res.end('ok');
    } else if (pathname === '/set') {
      let body = '';
      req.on('data', chunk => { body += chunk.toString(); });
      req.on('end', () => {
        try {
          const data = JSON.parse(body);
          timerState.status = 'stopped';
          timerState.accumulated = 0;
          timerState.mode = data.mode || 'up';
          if (data.mode === 'down') {
            timerState.targetMs = (data.seconds || 0) * 1000;
          }
          res.writeHead(200); res.end('ok');
        } catch (e) {
          res.writeHead(400); res.end('bad request');
        }
      });
    } else {
      res.writeHead(404); res.end('not found');
    }
  }
});

const PORT = 8080;
server.listen(PORT, () => {
  console.log('=============================================');
  console.log(' NEURA Timer Server is running!');
  console.log('=============================================');
  console.log(' [Control Panel] http://localhost:' + PORT + '/');
  console.log(' [OBS Display]   http://localhost:' + PORT + '/display');
  console.log('=============================================');
}).on('error', (e) => {
  if (e.code === 'EADDRINUSE') {
    console.log('Port ' + PORT + ' is in use, trying ' + (PORT + 1) + '...');
    setTimeout(() => {
      server.close();
      server.listen(PORT + 1);
    }, 1000);
  }
});`;

                        <div className="mb-5 pt-5 border-t border-[#222]">
                          <Slider label="行間 (上下の表示要素との間隔)" value={rowGap} min={-0.5} max={1.5} step={0.05} onChange={setRowGap} />
                        </div>
                        <div className="pt-5 border-t border-[#222]">
                          <label className="block text-sm font-medium mb-3 text-gray-400">枠内の文字配置</label>
                          <div className="flex bg-[#0a0a0a] border border-[#222] rounded-lg p-1.5 gap-1">
                            <button onClick={() => setTextAlign('left')} className={`flex-1 flex justify-center items-center gap-1.5 py-2 text-xs font-bold rounded-lg transition-all ${textAlign === 'left' ? 'bg-[#333] text-white shadow-md' : 'text-gray-500 hover:text-gray-300 hover:bg-[#1a1a1a]'}`}><AlignLeft className="w-3.5 h-3.5" /> 左</button>
                            <button onClick={() => setTextAlign('center')} className={`flex-1 flex justify-center items-center gap-1.5 py-2 text-xs font-bold rounded-lg transition-all ${textAlign === 'center' ? 'bg-[#333] text-white shadow-md' : 'text-gray-500 hover:text-gray-300 hover:bg-[#1a1a1a]'}`}><AlignCenter className="w-3.5 h-3.5" /> 中央</button>
                            <button onClick={() => setTextAlign('right')} className={`flex-1 flex justify-center items-center gap-1.5 py-2 text-xs font-bold rounded-lg transition-all ${textAlign === 'right' ? 'bg-[#333] text-white shadow-md' : 'text-gray-500 hover:text-gray-300 hover:bg-[#1a1a1a]'}`}><AlignRight className="w-3.5 h-3.5" /> 右</button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <div className={activeTab === 'design' ? 'block animate-[fadeIn_0.3s_ease-out]' : 'hidden'}>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12">
                    <div>
                      <PanelHeading icon={Palette} title="基本カラー" />
                      <div className="mb-8 bg-[#111] border border-[#333] p-5 rounded-2xl">
                        <ColorPicker label="テキストカラー" value={color} onChange={setColor} />
                        <div className="flex items-center justify-between pt-2 border-t border-[#222]">
                          <span className="text-sm font-medium text-gray-400">太字 (Bold)</span>
                          <div className="switch" onClick={() => setBold(!bold)}>
                            <input type="checkbox" checked={bold} readOnly />
                            <span className="slider"></span>
                          </div>
                        </div>
                      </div>
                      <PanelHeading icon={Hash} title="縁取り (Stroke)" />
                      <div className="bg-[#111] border border-[#333] p-5 rounded-2xl">
                        <Slider label="太さ" value={strokeWidth} min={0} max={20} onChange={setStrokeWidth} />
                        <div className={`transition-all duration-300 mt-2 ${strokeWidth === 0 ? 'opacity-30 pointer-events-none grayscale h-0 overflow-hidden' : 'h-auto'}`}>
                          <ColorPicker label="縁取りカラー" value={strokeColor} onChange={setStrokeColor} />
                        </div>
                      </div>
                    </div>
                    <div>
                      <PanelHeading icon={Layers} title="ドロップシャドウ" />
                      <div className="bg-[#111] border border-[#333] p-5 rounded-2xl">
                        <div className="flex items-center justify-between mb-6 pb-4 border-b border-[#222]">
                          <span className="text-sm font-bold text-gray-300 tracking-wide">シャドウを有効にする</span>
                          <div className="switch" onClick={() => setShowShadow(!showShadow)}>
                            <input type="checkbox" checked={showShadow} readOnly />
                            <span className="slider"></span>
                          </div>
                        </div>
                        <div className={`transition-all duration-300 ${!showShadow ? 'opacity-30 pointer-events-none grayscale' : ''}`}>
                          <ColorPicker label="影のカラー" value={shadowColor} onChange={setShadowColor} />
                          <Slider label="ぼかし (Blur)" value={shadowBlur} min={0} max={30} onChange={setShadowBlur} />
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 mt-2">
                            <Slider label="横方向 (X)" value={shadowX} min={-20} max={20} onChange={setShadowX} />
                            <Slider label="縦方向 (Y)" value={shadowY} min={-20} max={20} onChange={setShadowY} />
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <div className={activeTab === 'custom' ? 'block animate-[fadeIn_0.3s_ease-out]' : 'hidden'}>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12">
                    <div>
                      <PanelHeading icon={Sparkles} title="表示要素の追加" />
                      <div className="flex flex-col gap-2">
                        <QuickSettingItem icon={Tag} label="カスタムラベル (タイトル)" description="タイマーの周辺に任意のテキスト(種目名など)を表示します" isActive={decLabel} onToggle={setDecLabel}>
                          <div className="flex flex-col gap-4 py-2">
                            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 sm:gap-4">
                              <span className="text-sm font-medium text-gray-400">表示テキスト</span>
                              <input type="text" value={decLabelText} onChange={(e) => setDecLabelText(e.target.value)} className="modern-input sm:max-w-[240px]" placeholder="例: #Timer" />
                            </div>
                            <div className="flex items-center justify-between gap-4">
                              <span className="text-sm font-medium text-gray-400 w-24">サイズ</span>
                              <div className="flex-1 flex items-center gap-3">
                                <input type="range" min={0.1} max={1.0} step={0.01} value={labelSize} onChange={(e) => setLabelSize(Number(e.target.value))} className="w-full h-1.5 bg-[#111] rounded-lg appearance-none cursor-pointer outline-none" style={{ accentColor: 'var(--accent-color)' }} />
                                <span className="text-xs font-mono w-8 text-right text-gray-400">{labelSize.toFixed(2)}</span>
                              </div>
                            </div>
                            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 sm:gap-4">
                              <span className="text-sm font-medium text-gray-400">大まかな配置</span>
                              <div className="flex bg-[#0a0a0a] border border-[#222] rounded-lg p-1.5 gap-1 sm:max-w-[240px] w-full">
                                <button onClick={() => setLabelAlignY('top')} className={`flex-1 py-1.5 text-xs font-bold rounded-lg transition-all ${labelAlignY === 'top' ? 'bg-[#333] text-white shadow-md' : 'text-gray-500 hover:text-gray-300 hover:bg-[#1a1a1a]'}`}>時計の上</button>
                                <button onClick={() => setLabelAlignY('bottom')} className={`flex-1 py-1.5 text-xs font-bold rounded-lg transition-all ${labelAlignY === 'bottom' ? 'bg-[#333] text-white shadow-md' : 'text-gray-500 hover:text-gray-300 hover:bg-[#1a1a1a]'}`}>時計の下</button>
                              </div>
                            </div>
                            <div className="flex items-center justify-between gap-4">
                              <span className="text-sm font-medium text-gray-400 w-24">左右の微調整</span>
                              <div className="flex-1 flex items-center gap-3">
                                <input type="range" min={-5.0} max={5.0} step={0.1} value={labelOffsetX} onChange={(e) => setLabelOffsetX(Number(e.target.value))} className="w-full h-1.5 bg-[#111] rounded-lg appearance-none cursor-pointer outline-none" style={{ accentColor: 'var(--accent-color)' }} />
                                <span className="text-xs font-mono w-8 text-right text-gray-400">{labelOffsetX.toFixed(1)}</span>
                              </div>
                            </div>
                            <div className="flex items-center justify-between gap-4">
                              <span className="text-sm font-medium text-gray-400 w-24">上下の微調整</span>
                              <div className="flex-1 flex items-center gap-3">
                                <input type="range" min={-5.0} max={5.0} step={0.1} value={labelOffsetY} onChange={(e) => setLabelOffsetY(Number(e.target.value))} className="w-full h-1.5 bg-[#111] rounded-lg appearance-none cursor-pointer outline-none" style={{ accentColor: 'var(--accent-color)' }} />
                                <span className="text-xs font-mono w-8 text-right text-gray-400">{labelOffsetY.toFixed(1)}</span>
                              </div>
                            </div>
                          </div>
                        </QuickSettingItem>
                      </div>
                    </div>
                    <div>
                      <PanelHeading icon={Frame} title="背景・枠の追加" />
                      <QuickSettingItem icon={Frame} label="外枠・バックグラウンド" description="全体を囲むパネルや枠を追加します" isActive={decFrame !== 'none'} onToggle={(active) => setDecFrame(active ? 'glass' : 'none')}>
                        <div className="flex flex-col gap-5 py-3">
                          <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 sm:gap-4">
                            <span className="text-sm font-medium text-gray-400">枠のデザイン</span>
                            <select value={decFrame} onChange={(e) => setDecFrame(e.target.value)} className="modern-input sm:max-w-[240px]">
                              <option value="none">なし (無効化)</option>
                              <option value="simple">シンプルボーダー</option>
                              <option value="glass">すりガラス調 (おすすめ)</option>
                              <option value="cyber">サイバーパンク風</option>
                            </select>
                          </div>
                          {decFrame !== 'none' && (
                            <>
                              <div className="flex items-center justify-between gap-4">
                                <span className="text-sm font-medium text-gray-400 w-24">内部の余白</span>
                                <div className="flex-1 flex items-center gap-3">
                                  <input type="range" min={0.1} max={1.5} step={0.1} value={framePadding} onChange={(e) => setFramePadding(Number(e.target.value))} className="w-full h-1.5 bg-[#111] rounded-lg appearance-none cursor-pointer outline-none" style={{ accentColor: 'var(--accent-color)' }} />
                                  <span className="text-xs font-mono w-8 text-right text-gray-400">{framePadding.toFixed(1)}</span>
                                </div>
                              </div>
                              <ColorPicker label="枠の背景カラー" value={frameBgColor} onChange={setFrameBgColor} className="mb-0" />
                            </>
                          )}
                        </div>
                      </QuickSettingItem>
                      <div className="mt-6 bg-[#111] border border-[#333] p-5 rounded-2xl">
                        <h5 className="text-sm font-bold text-gray-300 mb-4 flex items-center gap-2">
                          <Settings className="w-4 h-4 text-gray-500"/> ベース背景設定
                        </h5>
                        <p className="text-[12px] text-gray-400 mb-4 leading-relaxed">
                          <strong className="text-[#5D9CC4]">【ヒント】</strong>ウィンドウキャプチャで利用する場合は、不透明度を 1 にし、背景カラーを緑（#00FF00）などに設定してください。
                        </p>
                        <Slider label="背景の不透明度" value={bgOpacity} min={0} max={1} step={0.1} onChange={setBgOpacity} />
                        <div className={`transition-all duration-300 mt-2 ${bgOpacity === 0 ? 'opacity-30 pointer-events-none grayscale' : ''}`}>
                          <ColorPicker label="背景カラー" value={bgColor} onChange={setBgColor} />
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <div className={activeTab === 'help' ? 'block animate-[fadeIn_0.3s_ease-out]' : 'hidden'}>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12">
                    <div className="flex flex-col gap-8">
                      <div>
                        <PanelHeading icon={Monitor} title="OBSへの基本的な導入方法" />
                        <div className="bg-[#111] border border-[#333] p-5 rounded-2xl text-[13px] text-gray-300 leading-relaxed">
                          <ol className="list-decimal pl-5 space-y-3">
                            <li>右上の<strong className="text-white">「一式をZIPで保存」</strong>ボタンを押してキットをダウンロードし、解凍します。</li>
                            <li>解凍したフォルダ内の <code className="text-[#5D9CC4]">start.bat</code> (Macの場合は <code>start.sh</code>) を実行してサーバーを起動します。<br/><span className="text-xs text-orange-400">※PCに Node.js がインストールされている必要があります。</span></li>
                            <li>OBSを開き、ソースの「＋」ボタンから<strong className="text-white">「ブラウザ」</strong>を選択します。</li>
                            <li><strong className="text-[#ef4444]">「ローカルファイル」のチェックは外し</strong>、URLに <code>http://localhost:8080/display</code> と入力します。</li>
                            <li>Webブラウザ(Chromeなど)で <code>http://localhost:8080/</code> を開くと、操作パネルが表示されます。</li>
                          </ol>
                        </div>
                      </div>

                      <div>
                        <PanelHeading icon={Upload} title="ローカルフォントを使う場合" />
                        <div className="bg-[#111] border border-[#333] p-5 rounded-2xl text-[13px] text-gray-300 leading-relaxed">
                          <p className="mb-4">PC内にある好きなフォントファイル（.ttf, .otfなど）を使う場合の手順です。</p>
                          <ol className="list-decimal pl-5 space-y-3">
                            <li>基本タブの「PC内のフォントを選択」から使いたいフォントを読み込みます。</li>
                            <li>右上の<strong className="text-white">「一式をZIPで保存」</strong>ボタンを押して保存します。</li>
                            <li>保存されたZIPファイルを<strong className="text-[#ef4444]">必ず解凍（展開）</strong>します。</li>
                            <li>OBSのブラウザソースで読み込むURLは通常通り <code>http://localhost:8080/display</code> のままで大丈夫です（サーバーがフォントも配信します）。</li>
                          </ol>
                        </div>
                      </div>
                    </div>

                    <div>
                      <PanelHeading icon={HelpCircle} title="よくある質問 (Q&A)" />
                      <div className="flex flex-col gap-4">
                        
                        <div className="bg-[#111] border border-[#333] p-5 rounded-xl border-l-4 border-l-green-500">
                          <h5 className="font-bold text-white mb-2 flex items-center gap-2 text-sm"><span className="text-green-500 text-lg font-black">Q.</span> Node.jsの導入が難しそうです。もっと簡単な方法はありますか？</h5>
                          <p className="text-[13px] text-gray-400 leading-relaxed flex items-start gap-2">
                            <span className="font-black text-gray-500 text-lg mt-[-2px]">A.</span> 
                            <span className="w-full">
                              「ウィンドウキャプチャ」を使った簡易的な方法があります。<br/>
                              <br/>
                              1. ジェネレーターの「背景・枠の追加」タブで「背景の不透明度」を 1 にし、「背景カラー」を緑色（#00FF00）などに設定します。<br/>
                              2. OBSのソース追加から「ウィンドウキャプチャ」を選び、このブラウザの画面を取り込みます。<br/>
                              3. OBS上で、<strong className="text-white">Altキーを押しながら枠の端をドラッグ</strong>して、タイマー部分だけが見えるように切り抜きます（クロップ）。<br/>
                              4. OBSのフィルタで「クロマキー」を追加し、緑色を透明に抜きます。<br/>
                              5. あとは、下部にある「動作確認用パネル」のStart/Stopボタンで操作するだけです！
                            </span>
                          </p>
                        </div>

                        <div className="bg-[#111] border border-[#333] p-5 rounded-xl">
                          <h5 className="font-bold text-white mb-2 flex items-center gap-2 text-sm"><span className="text-[#5D9CC4] text-lg font-black">Q.</span> なぜわざわざ「start.bat」を起動するの？</h5>
                          <p className="text-[13px] text-gray-400 leading-relaxed flex items-start gap-2">
                            <span className="font-black text-gray-500 text-lg mt-[-2px]">A.</span> 
                            <span>OBSの画面（表示）と操作パネルを完全に切り離すためです。これにより、「間違えてタイマーを消しちゃった」「操作パネルが配信に映り込んじゃった」という放送事故を100%防ぐことができます。一度慣れれば一番安全な方法です。</span>
                          </p>
                        </div>

                        <div className="bg-[#111] border border-[#333] p-5 rounded-xl">
                          <h5 className="font-bold text-white mb-2 flex items-center gap-2 text-sm"><span className="text-[#5D9CC4] text-lg font-black">Q.</span> Node.js って何？どうやって入れるの？</h5>
                          <p className="text-[13px] text-gray-400 leading-relaxed flex items-start gap-2">
                            <span className="font-black text-gray-500 text-lg mt-[-2px]">A.</span> 
                            <span>タイマーを動かすためのシステムです。<a href="https://nodejs.org/ja/" target="_blank" rel="noopener noreferrer" className="text-[#5D9CC4] hover:underline">公式サイト</a>からインストーラーをダウンロードし、次へボタンを押していくだけで簡単に導入できます。</span>
                          </p>
                        </div>

                        <div className="bg-[#111] border border-[#333] p-5 rounded-xl">
                          <h5 className="font-bold text-white mb-2 flex items-center gap-2 text-sm"><span className="text-[#5D9CC4] text-lg font-black">Q.</span> タイマーの端が切れて（はみ出して）しまう</h5>
                          <p className="text-[13px] text-gray-400 leading-relaxed flex items-start gap-2">
                            <span className="font-black text-gray-500 text-lg mt-[-2px]">A.</span> 
                            <span>OBS側のブラウザソースのプロパティで「幅」と「高さ」の数値を大きくしてみてください。HTML側は自動で左上に寄るように作られているため、OBSの枠を広げれば全体が表示されます。</span>
                          </p>
                        </div>

                      </div>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
